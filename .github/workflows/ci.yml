name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test
      - dev
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
      - test
      - dev

permissions:
  contents: read

jobs:
  docker-test-env:
    # L'environnement de test complet (Docker) ne tourne que sur la branche `test`
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker test environment (lint + unit + integration)
        run: docker compose -f docker-compose.front-test.yml up --build --abort-on-container-exit --exit-code-from frontend-test-runner frontend-test-runner
      - name: Cleanup Docker test environment
        if: always()
        run: docker compose -f docker-compose.front-test.yml down -v --remove-orphans
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm run test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Integration tests
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Browser E2E
        run: npm run test:e2e:browser

  deploy-test:
    needs: [docker-test-env, lint, test, integration, build, browser-e2e]
    # Déploiement test uniquement sur la branche `test` (push ou lancement manuel)
    if: github.ref == 'refs/heads/test' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: test
    env:
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate environment secrets
        run: |
          test -n "${API_PROXY_TARGET}" || (echo "Missing API_PROXY_TARGET secret" && exit 1)
          test -n "${NEXT_PUBLIC_API_URL}" || (echo "Missing NEXT_PUBLIC_API_URL secret" && exit 1)
      - name: Deploy metadata
        run: |
          echo "Frontend test deployment context"
          echo "branch=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "actor=${GITHUB_ACTOR}"

  build-and-push-test-image:
    needs: [docker-test-env, lint, test, integration, build, browser-e2e]
    if: github.ref == 'refs/heads/test' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: test
    env:
      IMAGE_NAME: go-pharma-front
      IMAGE_TAG: ${{ github.sha }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || secrets.GCP_REGION }}
      GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY || secrets.GCP_ARTIFACT_REPOSITORY }}
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate test registry configuration
        run: |
          test -n "${GCP_REGION}" || (echo "Missing GCP_REGION" && exit 1)
          test -n "${GCP_ARTIFACT_REPOSITORY}" || (echo "Missing GCP_ARTIFACT_REPOSITORY" && exit 1)
          test -n "${API_PROXY_TARGET}" || (echo "Missing API_PROXY_TARGET" && exit 1)
          test -n "${NEXT_PUBLIC_API_URL}" || (echo "Missing NEXT_PUBLIC_API_URL" && exit 1)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          token_format: access_token
      - name: Resolve GCP project
        run: |
          PROJECT_ID="${GCP_PROJECT_ID:-${{ steps.auth.outputs.project_id }}}"
          test -n "${PROJECT_ID}" || (echo "Missing GCP project id in GCP_PROJECT_ID or GCP_CREDENTIALS" && exit 1)
          echo "GCP_PROJECT_ID=${PROJECT_ID}" >> "${GITHUB_ENV}"
          echo "IMAGE_BASE=${GCP_REGION}-docker.pkg.dev/${PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${IMAGE_NAME}" >> "${GITHUB_ENV}"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}
      - name: Build and push frontend image
        run: |
          docker buildx build \
            --file ./Dockerfile \
            --push \
            --build-arg API_PROXY_TARGET="${API_PROXY_TARGET}" \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}" \
            --tag "${IMAGE_BASE}:${IMAGE_TAG}" \
            --tag "${IMAGE_BASE}:test" \
            .

  deploy-production:
    needs: [lint, test, integration, build, browser-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate environment secrets
        run: |
          test -n "${API_PROXY_TARGET}" || (echo "Missing API_PROXY_TARGET secret" && exit 1)
          test -n "${NEXT_PUBLIC_API_URL}" || (echo "Missing NEXT_PUBLIC_API_URL secret" && exit 1)
      - name: Deploy metadata
        run: |
          echo "Frontend production deployment context"
          echo "branch=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "actor=${GITHUB_ACTOR}"
