name: Frontend CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test
      - dev
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
      - test
      - dev

jobs:
  docker-test-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker test environment (lint + unit + integration)
        run: docker compose -f docker-compose.front-test.yml up --build --abort-on-container-exit --exit-code-from frontend-test-runner frontend-test-runner
      - name: Cleanup Docker test environment
        if: always()
        run: docker compose -f docker-compose.front-test.yml down -v --remove-orphans
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Unit tests
        run: npm run test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Integration tests
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Browser E2E
        run: npm run test:e2e:browser

  deploy-test:
    needs: [docker-test-env, lint, test, integration, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    environment: test
    env:
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate environment secrets
        run: |
          test -n "${API_PROXY_TARGET}" || (echo "Missing API_PROXY_TARGET secret" && exit 1)
          test -n "${NEXT_PUBLIC_API_URL}" || (echo "Missing NEXT_PUBLIC_API_URL secret" && exit 1)
      - name: Deploy metadata
        run: |
          echo "Frontend test deployment context"
          echo "branch=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "actor=${GITHUB_ACTOR}"

  deploy-production:
    needs: [docker-test-env, lint, test, integration, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      API_PROXY_TARGET: ${{ secrets.API_PROXY_TARGET }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate environment secrets
        run: |
          test -n "${API_PROXY_TARGET}" || (echo "Missing API_PROXY_TARGET secret" && exit 1)
          test -n "${NEXT_PUBLIC_API_URL}" || (echo "Missing NEXT_PUBLIC_API_URL secret" && exit 1)
      - name: Deploy metadata
        run: |
          echo "Frontend production deployment context"
          echo "branch=${GITHUB_REF_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "actor=${GITHUB_ACTOR}"
