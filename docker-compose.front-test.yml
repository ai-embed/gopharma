name: gopharma-frontend-test

services:
  frontend-test-runner:
    init: true
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - ${FRONT_TEST_ENV_FILE:-.env.front-test.example}
    command:
      - sh
      - -lc
      - |
        set -e
        npm run lint
        npm run test
        npm run test:integration
